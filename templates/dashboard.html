<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B6 Trading Bot Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 20px; }
        h2 { color: #8b949e; margin: 20px 0 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; }
        .stat { font-size: 32px; font-weight: bold; color: #58a6ff; }
        .stat-label { font-size: 12px; color: #8b949e; margin-top: 5px; }
        .rsi-buy { color: #3fb950; }
        .rsi-sell { color: #f85149; }
        .rsi-neutral { color: #d29922; }
        .terminal { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px; height: 300px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; }
        .terminal input { background: transparent; border: none; color: #c9d1d9; width: 100%; font-family: inherit; font-size: 12px; outline: none; }
        .btn { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #2ea043; }
        .status-ok { color: #3fb950; }
        .status-error { color: #f85149; }
        .refresh { font-size: 12px; color: #8b949e; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #30363d; font-size: 13px; }
        th { color: #8b949e; font-weight: normal; }
    </style>
</head>
<body>
    <h1>🤖 B6 Trading Bot Dashboard</h1>
    
    <div class="grid">
        <div class="card">
            <div class="stat" id="rsi-value">--</div>
            <div class="stat-label">RSI(21)</div>
        </div>
        <div class="card">
            <div class="stat" id="price-value">--</div>
            <div class="stat-label">SOL/USDT Price</div>
        </div>
        <div class="card">
            <div class="stat" id="position-value">--</div>
            <div class="stat-label">Position</div>
        </div>
        <div class="card">
            <div class="stat" id="range-value">--</div>
            <div class="stat-label">24h Range</div>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h2>Terminal</h2>
            <div class="terminal" id="terminal-output">
                <div>Welcome to B6 Terminal</div>
                <div>Type commands and press Enter</div>
                <div>Allowed: status, ls, ps, date, uptime, df, free</div>
                <br>
            </div>
            <input type="text" id="terminal-input" placeholder="Enter command...">
            <button class="btn" onclick="runCommand()">Run</button>
        </div>
        
        <div class="card">
            <h2>Account Balances</h2>
            <div id="account-balances">Loading...</div>
            
            <h2>Bot Status</h2>
            <div id="status">Loading...</div>
            <div class="refresh">Auto-refreshes every 5 seconds</div>
        </div>
    </div>

    <script>
        let commandHistory = [];
        let historyIndex = -1;
        
        async function fetchStatus() {
        async function fetchAccount() {
            try {
                const res = await fetch('/api/account');
                const data = await res.json();
                if (data.balances) {
                    const html = data.balances.slice(0, 10).map(b => `<p>${b.asset}: ${b.total.toFixed(4)}</p>`).join('\n');
                    document.getElementById('account-balances').innerHTML = html;
                } else {
                    document.getElementById('account-balances').innerHTML = `<p class="status-error">${data.error || 'Error}</p>`;
                }
            } catch (e) {
                document.getElementById('account-balances').innerHTML = `<p class="status-error">Error: ${e.message}</p>`;
            }
        }
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                const rsi = data.rsi;
                const rsiEl = document.getElementById('rsi-value');
                const priceEl = document.getElementById('price-value');
                const posEl = document.getElementById('position-value');
                const rangeEl = document.getElementById('range-value');
                
                if (rsi.rsi !== null) {
                    rsiEl.textContent = rsi.rsi.toFixed(2);
                    rsiEl.className = 'stat ' + (rsi.rsi < 25 ? 'rsi-buy' : rsi.rsi > 75 ? 'rsi-sell' : 'rsi-neutral');
                }
                if (rsi.price !== null) {
                    priceEl.textContent = '$' + rsi.price.toFixed(2);
                }
                posEl.textContent = rsi.position || 'None';
                rangeEl.textContent = rsi.klines_range || '--';
                
                document.getElementById('status').innerHTML = `
                    <p>Last Update: <span class="status-ok">${rsi.last_update || 'Never'}</span></p>
                    <p>API Status: <span class="status-ok">Connected</span></p>
                `;
            } catch (e) {
                document.getElementById('status').innerHTML = `<p class="status-error">Error: ${e.message}</p>`;
            }
        }
        
        async function runCommand() {
            const input = document.getElementById('terminal-input');
            const cmd = input.value.trim();
            if (!cmd) return;
            
            commandHistory.push(cmd);
            historyIndex = commandHistory.length;
            
            const terminal = document.getElementById('terminal-output');
            terminal.innerHTML += `<div>$ ${cmd}</div>`;
            terminal.innerHTML += `<div style="color: #8b949e">Executing...</div>`;
            terminal.scrollTop = terminal.scrollHeight;
            
            try {
                const res = await fetch('/api/terminal', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({command: cmd})
                });
                const data = await res.json();
                
                if (data.output) {
                    terminal.innerHTML += `<div>${data.output.replace(/\n/g, '<br>')}</div>`;
                } else if (data.error) {
                    terminal.innerHTML += `<div style="color: #f85149">${data.error}</div>`;
                }
            } catch (e) {
                terminal.innerHTML += `<div style="color: #f85149">Error: ${e.message}</div>`;
            }
            
            terminal.innerHTML += '<br>';
            terminal.scrollTop = terminal.scrollHeight;
            input.value = '';
        }
        
        document.getElementById('terminal-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') runCommand();
        });
        
        // Auto refresh
        fetchStatus(); fetchAccount();
        setInterval(fetchStatus, 5000);
    </script>
</body>
</html>
